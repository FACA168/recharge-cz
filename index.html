<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>充值中心</title>
<style>
:root{--gd:#E60012;--gm:#0096D6;--gl:#E6F5FF;--gold:#E60012;--gol:#E6F5FF;--gb:#0096D6;--red:#E60012;--rl:#fde8ea;--bg:#f4f6fb;--w:#fff;--t:#1A3A6D;--ts:#1A3A6D;--tl:#94a3b8;--b:#e2e8f0;--s:0 2px 12px rgba(230,0,18,0.08);--sl:0 8px 32px rgba(230,0,18,0.12);--r:12px;--rs:8px;--tr:0.25s cubic-bezier(0.4,0,0.2,1);--fs:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fs);background:var(--bg);color:var(--t);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
.app-container{width:100%;max-width:450px;min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden}
.nav-header{background:var(--gd);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.nav-header-area{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-header .logo-placeholder{width:38px;height:38px;border-radius:8px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.nav-header .site-name{color:#fff;font-size:17px;font-weight:600;letter-spacing:.5px;white-space:nowrap;user-select:none;cursor:pointer}
.nav-header .nav-actions{margin-left:auto;display:flex;gap:8px}
.nav-header .btn-nav{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:7px 13px;border-radius:20px;font-size:13px;cursor:pointer;transition:var(--tr);white-space:nowrap;font-family:var(--fs)}
.nav-header .btn-nav:active{background:rgba(255,255,255,0.28);transform:scale(.96)}
.page{display:none;padding:16px;animation:fadeSlideIn .3s ease}
.page.active{display:block}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.banner-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:14px;box-shadow:var(--s);background:linear-gradient(135deg,#E6F5FF,#FFFFFF);min-height:100px;display:flex;align-items:center;justify-content:center}
.banner-wrap img{width:100%;display:block;object-fit:cover;max-height:180px}
.banner-placeholder{color:#1A3A6D;font-size:15px;font-weight:500;padding:30px;text-align:center;letter-spacing:1px}
.announcement-bar{background:#2DAEAA;border:1px solid #2DAEAA;border-radius:var(--rs);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;animation:pulseBorder 2s infinite}
@keyframes pulseBorder{0%,100%{border-color:#2DAEAA}50%{border-color:#1e8e8a}}
.card{background:var(--w);border-radius:var(--r);padding:18px 16px;margin-bottom:14px;box-shadow:var(--s);text-align:center}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--gm);flex-shrink:0}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:6px}
.input-group input{width:100%;padding:12px 14px;border:2px solid var(--b);border-radius:var(--rs);font-size:16px;font-family:var(--fs);transition:var(--tr);background:#FFFFFF;outline:none}
.input-group input::placeholder{color:#A0A0A0}
.input-group input:focus{border-color:var(--gm);background:#fff;box-shadow:0 0 0 3px rgba(0,150,214,0.12)}
.input-group label{color:#1A3A6D}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 28px;border-radius:25px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:var(--tr);font-family:var(--fs);width:auto}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:linear-gradient(135deg,#0096D6,#1A3A6D);color:#fff;box-shadow:0 4px 14px rgba(0,150,214,0.3)}
.btn-gold{background:linear-gradient(135deg,#0096D6,#1A3A6D);color:#fff;box-shadow:0 4px 14px rgba(0,150,214,0.35);font-size:16px;letter-spacing:1px}
.btn-outline{background:#fff;color:var(--gm);border:2px solid var(--gm)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:20px;width:auto}
.btn:disabled{opacity:.5;pointer-events:none}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px}
.status-processing{background:#fff8e1;color:#f09d00;border:1px solid #ffe0a0}
.status-success{background:#E6F5FF;color:#0096D6;border:1px solid #bfe6f5}
.status-failed{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.amount-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.amount-card{border:2px solid var(--b);border-radius:var(--rs);padding:14px 10px;text-align:center;cursor:pointer;background:#fafbfc;user-select:none}
.amount-card.selected{border-color:var(--gb);background:var(--gol)}
.amount-card .amount-main{font-size:22px;font-weight:700}
.amount-card .amount-discount{font-size:12px;color:var(--gold);margin-top:4px}
.calc-summary{background:#f9fafb;border-radius:var(--rs);padding:14px;margin-bottom:14px;border:1px dashed #dde}
.calc-row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px}
.calc-row.total{border-top:1px solid #e8e8e8;margin-top:6px;padding-top:10px;font-weight:700;font-size:17px;color:var(--gd)}
.qr-section{text-align:center;padding:10px 0}
.qr-tabs{display:flex;gap:8px;margin-bottom:12px;justify-content:center}
.qr-tab{padding:9px 18px;border-radius:20px;border:2px solid var(--b);background:#fff;cursor:pointer;font-size:13px}
.qr-tab.active{border-color:var(--gm);background:var(--gl);color:var(--gd);font-weight:600}
.qr-img-wrap{width:180px;height:180px;margin:0 auto;border-radius:var(--rs);overflow:hidden;border:2px solid #eee;background:#fff;display:flex;align-items:center;justify-content:center}
.upload-area{border:2px dashed #d0d5dd;border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;background:#fafbfc}
.upload-area:active{background:#f0f4f0}
.upload-area img{max-width:100%;max-height:200px;border-radius:6px;margin-top:8px}
.upload-area.has-image{border-color:#4caf50;background:#f9fdf9}
#uploadInput{display:none}
.result-icon{font-size:64px;text-align:center;margin:20px 0;animation:bounceIn .5s ease}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
.info-table{width:100%;font-size:13px;border-collapse:collapse}
.info-table td{padding:8px 10px;border-bottom:1px solid #f5f5f5}
.info-table td:first-child{color:var(--ts);width:30%}
.cs-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:#fff;border-radius:25px;color:var(--gm);font-weight:600;text-decoration:none;border:2px solid var(--gm);margin-top:10px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999;display:flex;align-items:center;justify-content:center}
.modal-dialog{background:#fff;border-radius:var(--r);padding:20px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:var(--sl);width:400px;position:relative}
.modal-close{position:absolute;top:10px;right:14px;background:0 0;border:none;font-size:22px;cursor:pointer;color:#999}
.admin-container{max-width:800px;width:100%;padding:16px}
.admin-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;background:#fff;border-radius:25px;padding:5px;box-shadow:var(--s)}
.admin-tab{flex:1;min-width:70px;padding:10px 12px;border-radius:20px;border:none;background:0 0;cursor:pointer;font-size:13px}
.admin-tab.active{background:var(--gd);color:#fff;font-weight:600}
.admin-panel{display:none;overflow-x:auto}
.admin-panel.active{display:block;animation:fadeSlideIn .3s ease}
.order-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:var(--rs);overflow:hidden;box-shadow:var(--s)}
.order-table th,.order-table td{padding:10px 8px;text-align:left;border-bottom:1px solid #eee}
.order-table th{background:#f5f7f6;font-weight:600;color:var(--ts);font-size:11px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
.badge-processing{background:#fff8e1;color:#e6a000}
.badge-failed{background:#ffebee;color:#c62828}
.badge-success{background:#E6F5FF;color:#0096D6}
.search-box{display:flex;gap:8px;margin-bottom:14px}
.search-box input{flex:1;padding:10px 14px;border:2px solid var(--b);border-radius:25px;font-size:14px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap;gap:10px}
.settings-row input[type="text"],.settings-row input[type="url"],.settings-row input[type="password"]{flex:1;min-width:180px;padding:9px 12px;border:2px solid var(--b);border-radius:20px;font-size:13px}
.img-upload-btn{padding:8px 16px;border-radius:20px;background:#f0f4f1;border:1px dashed #aaa;cursor:pointer;font-size:12px}
.settings-preview-img{width:60px;height:60px;object-fit:contain;border-radius:6px;border:1px solid #ddd}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:25px;font-size:14px;z-index:2000;animation:toastIn .3s ease,toastOut .3s ease 1.8s forwards;max-width:90vw}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-20px)}}
.loading-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;font-size:18px;color:var(--gm);flex-direction:column;gap:10px}
.spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:var(--gm);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-container{text-align:center;color:#c62828}
.error-container .big-icon{font-size:48px}
.error-container .retry-btn{margin-top:16px;padding:10px 30px;border-radius:20px;border:none;background:#E60012;color:#fff;font-size:16px;cursor:pointer}
.order-item{border-bottom:1px solid #eee;padding:10px 0;font-size:14px}
.order-item:last-child{border-bottom:none}
.order-item .order-id{font-weight:600;color:#1A3A6D}
.order-item .order-status{float:right}
.order-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.order-actions select{font-size:11px;padding:5px}
</style>
</head>
<body>
<div classspan>领取电子代金券</div>
<div class="input-group"><label>📱 手机号码</label><input type="tel" id="inputPhone" placeholder="请输入您的手机号码" maxlength="11" inputmode="numeric" autocomplete="tel"></div>
<button class="btn btn-gold" id="btnClaim">🎫 立即领取电子代金券</button>
<div style="margin-top:14px;text-align:center;" id="voucherStatusArea"><span style="color:#999;font-size:13px;">请输入手机号领取</span></div>
<button¥500</div><div class="amount-discount">🎫 代金券 ¥128</div></div>
</div>
<div class="calc-summary">
<div class="calc-row"><span>充值金额</span><span id="calcAmount">¥0</span></div>
<div class="calc-row"><span>代金券优惠</span><span style="color:#E60012;" id="calcDiscount">-¥0</span></div>
<div class="calc-row total"><span>实付金额</span><span style="color:#c62828;font-size:18px;" id="calcActual">¥0</span></div>
</div>
</div>
<div class="card">
<div class="card-title"><span class="dot"></span>支付方式</div>
<div class="qr-section">
<div class="qr-tabs">
<button class="qr-tab active" data-method="wechat"><svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align:-3px;margin-right:4px;"><circle cx="12" cy="12" r="12" fill="#09BB07"/><path d="M9.2 9.1c-1.8 0-3.2 1.1-3.2 2.5 0 .8.5 1.5 1.2 2l-.3 1 1.1-.6c.4.1.8.2 1.2.2-.1-.3-.1-.5-.1-.8 0-1.6 1.6-2.8 3.6-2.8.2 0 .4 0 .6.1-.2-.8-.9-1.8-2.1-1.8zm-1.2 1.4c.3 0 .5.2.5.5s-.2.5-.5.5-.5-.2-.5-.5.2-.5.5-.5zm2.2 0c.3 0 .5.2.5.5s-.2.5-.5.5-.5-.2-.5-.5.2-.5.5-.5z" fill="#fff"/><path d="M16.5 14.2c0-1.3-1.3-2.4-3-2.4-1.8 0-3.2 1.1-3.2 2.4 0 1.3 1.4 2.4 3.2 2.4.4 0 .8-.1 1.1-.2l.9.5-.2-.8c.6-.4 1-1 1-1.5zm-3.8.8c-.3 0-.5-.2-.5-.5s.2-.5.5-.5.5.2.5.5-.2.5-.5.5zm1.9 0c-.3 0-.5-.2-.5-.5s.2-.5.5-.5.5.2.5.5-.2.5-.5.5z" fill="#fff"/></svg>微信支付</button>
<button class="qr-tab" data-method="alipay"><svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align:-3px;margin-right:4px;"><rect width="24" height="24" rx="5" fill="#1677FF"/><text x="12" y="17" font-size="14" font-weight="700" text-anchor="middle" fill="#fff" font-family="sans-serif">支</text></svg>支付宝</button>
</div>
<div class="qr-img-wrap" id="qrDisplay" data-payment="wechat"><span class="qr-placeholder">请在后台设置收款码</span></div>
<p style="font-size:11px;color:#999;">请扫描上方二维码完成支付</p>
</div>
<div class="upload-area" id="uploadArea">
<div class="upload-icon">📸</div>
<div class="upload-text">点击上传付款截图</div>
<img id="uploadPreview" style="display:none;">
</div>
<input type="file" id="uploadInput" accept="image/png,image/jpeg,image/jpg,image/webp" style="display:none;">
<button class="btn btn-primary" style="margin-top:12px;" id="submitOrderBtn">✅ 提交订单</button>
</div>
</div>

<!-- 结果页 -->
<div class="page" id="pageResult">
<div class="card" style="text-align:center;">
<div class="result-icon" id="resultIcon">⏳</div>
<div class="result-status" id="resultStatus">🟡 处理中…</div>
</div>
<div class="card">
<div class="card-title"><span class="dot"></span>订单详情</div>
<table class="info-table">
<tr><td>订单号</td><td id="resOrderId">-</td></tr>
<tr><td>手机号</td><td id="resPhone">-</td></tr>
<tr><td>电子券编号</td><td id="resVoucherCode">-</td></tr>
<tr><td>充值金额</td><td id="resAmount">-</td></tr>
<tr><td>代金券优惠</td><td id="resDiscount" style="color:#E60012;">-</td></tr>
<tr><td>实付金额</td><td id="resActual" style="font-weight:700;">-</td></tr>
<tr><td>状态</td><td id="resStatusCell">-</td></tr>
</table>
</div>
<a class="cs-link" id="csLinkResult" href="#">💬 联系在线客服</a>
<button class="btn btn-outline" style="margin-top:10px;" id="btnBackHome">返回首页</button>
</div>

<!-- 后台管理页（内嵌） -->
<div class="page" id="pageAdmin">
<div class="admin-container">
<h3 style="text-align:center;color:var(--gd);">🔐 后台管理</h3>
<div id="adminLoginArea">
<div class="card">
<div class="input-group"><label>管理员密码</label><input type="password" id="adminPasswordInput" placeholder="请输入管理密码" autocomplete="current-password"></div>
<button class="btn btn-primary" id="btnAdminLogin">登录</button>
<p style="font-size:11px;color:#999;text-align:center;">请使用管理员分配的密码登录</p>
</div>
</div>
<div id="adminContentArea" style="display:none;">
<div class="admin-tabs">
<button class="admin-tab active" data-tab="orders">📋 订单管理</button>
<button class="admin-tab" data-tab="qrcodes">📱 收款码</button>
<button class="admin-tab" data-tab="service">💬 客服设置</button>
<button class="admin-tab" data-tab="site">🌐 网站设置</button>
</div>
<div class="admin-panel active" id="adminPanelOrders">
<div class="search-box">
<input type="text" id="orderSearchInput" placeholder="搜索手机号/订单号">
<button class="btn btn-sm btn-primary" id="btnSearchOrders">搜索</button>
</div>
<table class="order-table">
<thead><tr><th>订单号</th><th>手机号</th><th>券编号</th><th>金额</th><th>实付</th><th>状态</th><th>操作</th></tr></thead>
<tbody id="orderTableBody"></tbody>
</table>
</div>
<div class="admin-panel" id="adminPanelQrcodes">
<div class="card">
<div class="settings-row"><label>💚 微信收款码</label><input type="file" accept="image/png,image/jpeg,image/jpg,image/webp" style="display:none;" id="wechatQRInput"><button class="img-upload-btn" id="btnWechatQR">上传图片</button><img class="settings-preview-img" id="wechatQRPreview"><span id="wechatQRStatus">未设置</span></div>
<div class="settings-row"><label>💙 支付宝收款码</label><input type="file" accept="image/png,image/jpeg,image/jpg,image/webp" style="display:none;" id="alipayQRInput"><button class="img-upload-btn" id="btnAlipayQR">上传图片</button><img class="settings-preview-img" id="alipayQRPreview"><span id="alipayQRStatus">未设置</span></div>
</div>
</div>
<div class="admin-panel" id="adminPanelService">
<div class="card">
<div class="settings-row"><label>客服名称</label><input type="text" id="csNameInput"></div>
<div class="settings-row"><label>客服链接</label><input type="url" id="csLinkInput"></div>
<button class="btn btn-primary btn-sm" id="btnSaveService">💾 保存客服设置</button>
</div>
</div>
<div class="admin-panel" id="adminPanelSite">
<div class="card">
<div class="settings-row"><label>网站名称</label><input type="text" id="siteNameInput"></div>
<div class="settings-row"><label>Logo图片</label><input type="file" accept="image/png,image/jpeg,image/jpg,image/webp" style="display:none;" id="logoInput"><button class="img-upload-btn" id="btnLogo">上传Logo</button><img class="settings-preview-img" id="logoPreview"></div>
<div class="settings-row"><label>Banner图片</label><input type="file" accept="image/png,image/jpeg,image/jpg,image/webp" style="display:none;" id="bannerInput"><button class="img-upload-btn" id="btnBanner">上传Banner</button><img class="settings-preview-img" id="bannerPreview"></div>
<div class="settings-row"><label>首页公告</label><input type="text" id="announcementInput"></div>
<div class="settings-row"><label>管理密码</label><input type="password" id="adminPwdInput" placeholder="修改管理密码" autocomplete="new-password"></div>
<button class="btn btn-primary btn-sm" id="btnSaveSite">💾 保存网站设置</button>
</div>
</div>
<button class="btn btn-outline btn-sm" style="margin-top:12px;" id="btnAdminLogout">🚪 退出登录</button>
</div>
</div>
</div>

<!-- 订单查询模态框 -->
<div class="modal-overlay" id="queryModal" style="display:none;">
<div class="modal-dialog">
<button class="modal-close" id="btnCloseQuery">✕</button>
<h4>🔍 查询我的订单</h4>
<div class="input-group" style="margin-top:12px;">
<label>📱 手机号码</label>
<input type="tel" id="queryPhone" placeholder="输入领券时的手机号" inputmode="numeric" maxlength="11">
</div>
<button class="btn btn-primary" id="btnQuerySubmit">查询</button>
<div id="queryResult" style="margin-top:12px;"></div>
</div>
</div>

<!-- 查看凭证弹窗 -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
<div class="modal-dialog">
<button class="modal-close" id="btnCloseModal">✕</button>
<h4>📸 支付凭证</h4>
<img id="modalImage" src="" style="width:100%;border-radius:6px;">
</div>
</div>

<script src="app.js"></script>
</body>
</html>
